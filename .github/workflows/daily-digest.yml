name: 毎日ダイジェスト（Bluesky/Mastodon自動投稿＋Xの下書きIssue）

# 毎日 21:00 JST（12:00 UTC）に自動実行。手動実行（workflow_dispatch）も可能。
# 投稿内容は曜日で出し分ける（scripts/lib/build-digest.js）:
#   日曜=今期の注目作TOP5＋その日の放送/配信があれば曜日紹介（最大2投稿）
#   月〜土=その曜日に放送・配信のある今期アニメ。
# Bluesky/Mastodonは投稿APIが無料のため自動投稿する。Xは有料化されたため
# 自動投稿はせず、コピペ用の下書きをGitHub Issueとして起票するだけにする。
# 投稿にはサイト実画面のスクリーンショット（カレンダー表示の該当曜日 / 「今期の注目作
# TOP5」パネル）を添付する。Playwrightのヘッドレスブラウザで本番サイトを直接開いて撮る
# （新規デザインの画像は作らない。2026-07-14導入）。
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: スクリーンショット撮影用にChromiumをインストール
        run: npx playwright install --with-deps chromium

      - name: ダイジェスト本文を生成
        run: node scripts/print-digest.js > digest.txt

      - name: Blueskyへ自動投稿（無料・Secrets未設定ならスキップ）
        run: node scripts/post-bluesky.js
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: Mastodonへ自動投稿（無料・Secrets未設定ならスキップ）
        run: node scripts/post-mastodon.js
        env:
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}

      - name: Xの下書きをGitHub Issueとして起票（手動投稿用）
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Xへの投稿下書き ($(date +%Y-%m-%d))" \
            --body-file digest.txt
