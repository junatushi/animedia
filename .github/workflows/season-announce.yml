name: 新シーズン告知（Bluesky/Mastodon自動投稿＋Xの下書きIssue）

# 各クール初日（1/4/7/10月の1日）21:00 JST（12:00 UTC）に自動実行し、
# 「新クール始まりました」の告知を投稿する。手動実行（workflow_dispatch）も可能。
# 中身は POST_KIND=season で scripts/lib/build-digest.js の buildSeasonAnnounce を使う。
# 日次ダイジェスト（daily-digest.yml）とは別枠。初日は両方投稿されるが、告知＋日次で問題ない。
on:
  schedule:
    - cron: "0 12 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  POST_KIND: season

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: 告知本文を生成
        run: node scripts/print-digest.js > announce.txt

      - name: Blueskyへ自動投稿（無料・Secrets未設定ならスキップ）
        run: node scripts/post-bluesky.js
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: Mastodonへ自動投稿（無料・Secrets未設定ならスキップ）
        run: node scripts/post-mastodon.js
        env:
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}

      - name: Xの下書きをGitHub Issueとして起票（手動投稿用）
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Xへの新シーズン告知下書き ($(date +%Y-%m-%d))" \
            --body-file announce.txt
