name: キャッシュ温め（/api/season）

# /api/seasonはAnnictへの問い合わせ結果を10分キャッシュしている
# （lib/annict.ts の next.revalidate）。トップページ（/）・シーズンページ
# （/season/[year]/[season]）はどちらもこの同じキャッシュを参照するため、
# ここを温めておけばその2つが両方とも速くなる。
#
# キャッシュが切れた直後に訪問した人はAnnictへの生取得を直接待つことになる
# （実測: 現行のクエリ最適化後でも2〜4秒程度、シーズンの作品数次第）ため、
# キャッシュの有効期限（10分）より短い間隔で定期的に叩いておき、実訪問者が
# 常にキャッシュ済み（実測0.1〜0.4秒）を引けるようにする。
#
# 対象は「今年の4シーズン」（季節タブでの切り替えが最も多いユースケードのため）。
# 年をまたぐ・過去年への切り替えまでは温めない（頻度が低く、対象を広げすぎると
# Annictへの負荷が増えるため）。
on:
  schedule:
    - cron: "*/8 * * * *"
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: 今年の4シーズン分のAPIを叩く
        run: |
          YEAR=$(TZ=Asia/Tokyo date +%Y)
          for SEASON in winter spring summer autumn; do
            curl -s -o /dev/null -w "year=${YEAR} season=${SEASON} status=%{http_code} time=%{time_total}s\n" \
              "https://animedia-khaki.vercel.app/api/season?year=${YEAR}&season=${SEASON}"
          done
